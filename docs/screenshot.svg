  </g>
  <g transform="translate(386 374)">
    <rect width="206" height="54" rx="27" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.18)"/>
    <text x="28" y="35" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Preview</text>
  </g>
  <g transform="translate(614 374)">
    <rect width="206" height="54" rx="27" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.18)"/>
    <text x="28" y="35" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Download</text>
  </g>
  <g transform="translate(744 130)">
    <rect width="350" height="300" rx="34" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="42" y="196" width="266" height="14" rx="7" fill="rgba(255,255,255,0.12)"/>
    <rect x="42" y="196" width="184" height="14" rx="7" fill="url(#meter)"/>
    <g transform="translate(67 55)">
      <rect x="0" y="64" width="24" height="70" rx="8" fill="#86efac"/>
      <rect x="46" y="34" width="24" height="100" rx="8" fill="#22c55e"/>
      <rect x="92" y="6" width="34" height="128" rx="9" fill="#fb923c"/>
      <rect x="146" y="48" width="24" height="86" rx="8" fill="#86efac"/>
      <rect x="192" y="20" width="34" height="114" rx="9" fill="#7c3aed"/>
    </g>
    <text x="74" y="254" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">PREVIEW</text>
