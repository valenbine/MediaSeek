<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MediaSeek Web Interface Preview</title>
  <desc id="desc">A stylized preview image for the MediaSeek web media parser and downloader.</desc>
  <rect width="1280" height="720" fill="#090914"/>
  <g opacity="0.42">
    <circle cx="260" cy="116" r="230" fill="#22c55e"/>
    <circle cx="1030" cy="90" r="280" fill="#7c3aed"/>
  </g>
  <path d="M0 0h1280v720H0z" fill="url(#grid)" opacity="0.22"/>
  <rect x="74" y="62" width="1132" height="596" rx="42" fill="rgba(30,27,75,0.72)" stroke="rgba(255,255,255,0.16)"/>
  <text x="122" y="138" fill="#86efac" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4">ONLINE MEDIA PARSER</text>
  <text x="122" y="210" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">MediaSeek</text>
  <text x="122" y="260" fill="#dbe4f6" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">寻音觅影</text>
  <text x="122" y="318" fill="#b8c0d9" font-family="Inter, Arial, sans-serif" font-size="22">Search, parse, preview and save online media streams.</text>
  <g transform="translate(122 374)">
    <rect width="242" height="54" rx="27" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.18)"/>
